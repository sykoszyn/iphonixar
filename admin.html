<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="referrer" content="no-referrer"/>
<title>iPhonixAr — Panel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e1525;--s1:#162040;--s2:#1a2540;--s3:#0d1627;
  --cr:#ede8df;--cr2:rgba(237,232,223,.55);--bd:rgba(237,232,223,.1);
  --gr:#34d399;--rd:#f87171;--yw:#fbbf24;--bl:#60a5fa;
}
body{background:var(--bg);color:var(--cr);min-height:100vh;overflow-x:hidden;font-family:'Inter',system-ui,sans-serif;}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:99px}

/* LOGIN */
#lscr{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;padding:1.5rem;}
.lbox{background:var(--s1);border:1px solid var(--bd);border-radius:22px;padding:2.5rem 2rem;width:min(360px,100%);text-align:center;}
.llogo{display:flex;align-items:center;justify-content:center;gap:.5rem;font-weight:800;font-size:1.2rem;margin-bottom:.4rem}
.lf{margin-bottom:1rem;text-align:left}
.lf label{font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--cr2);display:block;margin-bottom:.35rem}
.lf input{width:100%;background:var(--s3);border:1px solid var(--bd);border-radius:10px;color:var(--cr);padding:.7rem .9rem;font-size:.9rem;outline:none;}
.lbtn{width:100%;padding:.85rem;background:var(--cr);color:#0e1525;border:none;border-radius:12px;font-weight:700;font-size:.95rem;cursor:pointer;margin-top:.5rem;}

/* LAYOUT */
#app{display:none;min-height:100vh}
#topbar{position:fixed;top:0;left:0;right:0;height:56px;z-index:200;background:rgba(13,18,37,.97);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 1rem;}
.tb-logo{display:flex;align-items:center;gap:.4rem;font-weight:700;font-size:.95rem}
.tb-logo em{color:var(--cr2);font-style:normal}
.tb-r{display:flex;align-items:center;gap:.5rem;}
.tb-badge{font-size:.7rem;font-weight:600;padding:.25rem .65rem;border-radius:999px;background:rgba(52,211,153,.12);color:var(--gr);border:1px solid rgba(52,211,153,.25);}

/* SIDEBAR */
#sb{position:fixed;top:56px;left:0;bottom:0;width:210px;background:var(--s1);border-right:1px solid var(--bd);padding:1rem .75rem;z-index:150;}
.ni{display:flex;align-items:center;gap:.65rem;padding:.65rem .85rem;border-radius:10px;font-size:.82rem;font-weight:500;color:var(--cr2);cursor:pointer;border:none;background:transparent;width:100%;text-align:left}
.ni:hover{background:var(--s2);color:var(--cr)}
.ni.active{background:rgba(237,232,223,.1);color:var(--cr);font-weight:600}
.nsep{height:1px;background:var(--bd);margin:.5rem 0}

/* MAIN */
#main{padding-top:56px;margin-left:210px;min-height:100vh;}
.page{display:none;padding:1.5rem;max-width:1100px}
.page.active{display:block}
.ptitle{font-size:1.35rem;font-weight:800;letter-spacing:-.03em;margin-bottom:.25rem}

/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.85rem;margin-bottom:1.75rem}
.sc2{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:1.1rem}
.sn{font-size:1.7rem;font-weight:900;letter-spacing:-.04em}
.sl{font-size:.7rem;color:var(--cr2);margin-top:.2rem}
.sc2.gr .sn{color:var(--gr)}.sc2.bl .sn{color:var(--bl)}

/* TABLA */
.tw{background:var(--s1);border:1px solid var(--bd);border-radius:14px;overflow:hidden;overflow-x:auto}
.tw table{width:100%;border-collapse:collapse;min-width:600px}
.tw th{font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--cr2);padding:.8rem .9rem;text-align:left;background:rgba(237,232,223,.03);}
.tw td{padding:.7rem .9rem;font-size:.8rem;border-bottom:1px solid rgba(237,232,223,.05);vertical-align:middle}
.tn{font-weight:600;max-width:160px}.tn small{display:block;font-size:.68rem;color:var(--cr2);font-weight:400;}
.bdg{display:inline-block;padding:.18rem .55rem;border-radius:999px;font-size:.6rem;font-weight:700;}
.b-s{background:rgba(237,232,223,.12);color:var(--cr)}.b-u{background:rgba(96,165,250,.1);color:var(--bl)}

.tac{display:flex;gap:.3rem;}
.ab{padding:.32rem .55rem;border-radius:6px;font-size:.7rem;font-weight:600;border:none;cursor:pointer;}
.ae{background:rgba(96,165,250,.1);color:var(--bl)}.ad{background:rgba(248,113,113,.1);color:var(--rd)}

/* MODAL */
#pmov{display:none;position:fixed;inset:0;background:rgba(8,14,28,.88);z-index:300;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto}
#pmov.show{display:flex}
#pmod{background:var(--s1);border:1px solid var(--bd);border-radius:20px;width:min(700px,100%);margin:auto;padding:1.75rem;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
.sp2{grid-column:1/-1}
.fd{display:flex;flex-direction:column;gap:.3rem}
.fd label{font-size:.65rem;font-weight:700;text-transform:uppercase;color:var(--cr2)}
.fd input,.fd select,.fd textarea{background:var(--s3);border:1px solid var(--bd);border-radius:10px;color:var(--cr);padding:.65rem .85rem;font-size:.85rem;outline:none;}

/* FOTOS */
.foto-grid{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.6rem}
.foto-item{position:relative;width:72px;height:72px;border-radius:9px;overflow:hidden;border:1px solid var(--bd)}
.foto-item img{width:100%;height:100%;object-fit:cover}
.upload-area{border:2px dashed var(--bd);border-radius:12px;padding:1.5rem;text-align:center;cursor:pointer;position:relative;}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}

/* TOAST & CONFIRM */
#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);border-radius:999px;padding:.55rem 1.25rem;font-size:.8rem;z-index:500;opacity:0;transition:opacity .25s}
#toast.show{opacity:1}
#toast.ok{background:rgba(52,211,153,.15);color:var(--gr);border:1px solid rgba(52,211,153,.3)}
#cfov{display:none;position:fixed;inset:0;background:rgba(8,14,28,.88);z-index:400;align-items:center;justify-content:center}
#cfov.show{display:flex}
#cfbox{background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:1.6rem;width:300px;text-align:center}
.btn{padding:.55rem 1rem;border-radius:10px;font-size:.8rem;font-weight:600;border:none;cursor:pointer}
.btn-p{background:var(--cr);color:#0e1525}.btn-s{background:var(--s2);color:var(--cr)}
</style>
</head>
<body>

<div id="lscr">
  <div class="lbox">
    <div class="llogo">iPhonix<em style="color:rgba(237,232,223,.3);font-style:normal;font-weight:300">Ar</em> Admin</div>
    <div class="lf"><label>Usuario</label><input type="text" id="lu" placeholder="admin"/></div>
    <div class="lf"><label>Contraseña</label><input type="password" id="lp" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="lbtn" style="width:100%" onclick="doLogin()">Ingresar</button>
    <p id="lerr" style="color:var(--rd);display:none;font-size:.8rem;margin-top:1rem">Credenciales incorrectas</p>
  </div>
</div>

<div id="app">
  <div id="topbar">
    <div class="tb-logo">iPhonix<em>Ar</em> Admin</div>
    <div class="tb-r">
      <span class="tb-badge" id="tbcnt">0 productos</span>
      <button onclick="logout()" style="background:none;border:none;color:var(--cr2);cursor:pointer">Salir</button>
    </div>
  </div>

  <nav id="sb">
    <button class="ni active" data-page="dash" onclick="goPage('dash',this)">Dashboard</button>
    <button class="ni" data-page="prods" onclick="goPage('prods',this)">Productos</button>
    <div class="nsep"></div>
    <button class="ni" onclick="abrirNuevo()">+ Nuevo producto</button>
  </nav>

  <main id="main">
    <div class="page active" id="page-dash">
      <h1 class="ptitle">Dashboard</h1>
      <div class="sgrid">
        <div class="sc2 bl"><div class="sn" id="st-tot">0</div><div class="sl">Total productos</div></div>
        <div class="sc2 gr"><div class="sn" id="st-ok">0</div><div class="sl">En Stock</div></div>
      </div>
    </div>

    <div class="page" id="page-prods">
      <h1 class="ptitle">Productos</h1>
      <div style="margin-bottom:1rem;display:flex;gap:1rem">
        <button class="btn btn-p" onclick="abrirNuevo()">Nuevo Producto</button>
        <input type="text" id="fsrch" class="sb3" placeholder="Buscar..." oninput="renderTbl()" style="flex:1;background:var(--s1);border:1px solid var(--bd);padding:.5rem;border-radius:8px;color:white">
      </div>
      <div class="tw"><table>
        <thead><tr><th>Producto</th><th>Cat.</th><th>Precio</th><th>Stock</th><th>Acciones</th></tr></thead>
        <tbody id="pb"></tbody>
      </table></div>
    </div>
  </main>
</div>

<div id="pmov">
  <div id="pmod">
    <h3 id="mttl" style="margin-bottom:1rem">Producto</h3>
    <div class="fg">
      <div class="fd sp2"><label>Nombre</label><input type="text" id="fn"/></div>
      <div class="fd"><label>Categoría</label>
        <select id="fc" onchange="toggleSubcat()"><option>Equipos</option><option>Fundas</option><option>Cargadores</option></select>
      </div>
      <div class="fd" id="subcat-container"><label>Subcategoría</label>
        <select id="fsub"><option value="">— Ninguna —</option><option>Sellados</option><option>Usados</option></select>
      </div>
      <div class="fd"><label>Precio USD</label><input type="number" id="fp"/></div>
      <div class="fd"><label>Stock</label><input type="number" id="fst"/></div>
    </div>

    <div style="margin-top:1.5rem">
      <label style="font-size:.65rem;font-weight:700;color:var(--cr2)">FOTOS</label>
      <div class="foto-grid" id="fgrid"></div>
      <div class="upload-area">
        <input type="file" multiple accept="image/*" onchange="subirFotos(this.files)"/>
        <div style="font-size:.8rem">📷 Click para subir desde PC/Celular</div>
      </div>
    </div>

    <div style="display:flex;gap:.65rem;margin-top:1.5rem;justify-content:flex-end">
      <button class="btn btn-s" onclick="cerrarMod()">Cancelar</button>
      <button class="btn btn-p" id="msave" onclick="guardarProd()">Guardar</button>
    </div>
  </div>
</div>

<div id="cfov"><div id="cfbox">
    <h4 id="cftit">¿Confirmar?</h4><p id="cfmsg" style="font-size:.8rem;margin:1rem 0;color:var(--cr2)"></p>
    <div style="display:flex;gap:.5rem"><button class="btn btn-s" style="flex:1" onclick="cfClose()">No</button><button class="btn btn-p" id="cfok" style="flex:1;background:var(--rd);color:white">Borrar</button></div>
</div></div>
<div id="toast"></div>

<script>
'use strict';
const SBU = 'https://ircyvgdxvdxkcnjtnfmn.supabase.co';
const SRK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyY3l2Z2R4dmR4a2NuanRuZm1uIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDMwNTg1OSwiZXhwIjoyMDg5ODgxODU5fQ.lTqNplG9tbgvEzZHEF6vY1RJ-5rGp80srHMWjgeDn9s';
const BUCKET = 'fotos-productos';

const H = {'apikey':SRK,'Authorization':'Bearer '+SRK,'Content-Type':'application/json','Prefer':'return=representation'};
let allP = [], fotosActuales = [], editId = null;

/* LÓGICA DE INTERFAZ */
function toggleSubcat() {
  const cat = document.getElementById('fc').value;
  const container = document.getElementById('subcat-container');
  // Solo se muestra si es Equipos
  container.style.display = (cat === 'Equipos') ? 'flex' : 'none';
  if (cat !== 'Equipos') document.getElementById('fsub').value = "";
}

function doLogin(){
  if(document.getElementById('lu').value==='admin' && document.getElementById('lp').value==='iphonixar2025'){
    sessionStorage.setItem('iphxar_auth','1'); mostrarApp();
  } else document.getElementById('lerr').style.display='block';
}
function mostrarApp(){
  document.getElementById('lscr').style.display='none';
  document.getElementById('app').style.display='block';
  cargarProds();
}
function logout(){ sessionStorage.removeItem('iphxar_auth'); location.reload(); }
if(sessionStorage.getItem('iphxar_auth')==='1') mostrarApp();

function goPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
}

async function cargarProds(){
  const r=await fetch(SBU+'/rest/v1/productos?select=*&order=nombre',{headers:H});
  allP=await r.json(); renderTbl(); updStats();
}

function updStats(){
  document.getElementById('st-tot').textContent=allP.length;
  document.getElementById('st-ok').textContent=allP.filter(p=>p.stock>0).length;
  document.getElementById('tbcnt').textContent=allP.length+' productos';
}

function renderTbl(){
  const q = document.getElementById('fsrch').value.toLowerCase();
  const tb = document.getElementById('pb');
  tb.innerHTML = allP.filter(p=>p.nombre.toLowerCase().includes(q)).map(p=>`<tr>
    <td class="tn">${p.nombre}</td>
    <td><span class="bdg ${p.categoria==='Equipos'?'b-s':'b-u'}">${p.categoria}</span></td>
    <td style="font-weight:700">$${p.precio_usd}</td>
    <td>${p.stock}</td>
    <td><div class="tac">
      <button class="ab ae" onclick="abrirEdit('${p.id}')">Editar</button>
      <button class="ab ad" onclick="eliminar('${p.id}','${p.nombre}')">Borrar</button>
    </div></td>
  </tr>`).join('');
}

async function subirFotos(files){
  for(let f of files){
    const name = `prod_${Date.now()}_${f.name}`;
    const r = await fetch(`${SBU}/storage/v1/object/${BUCKET}/${name}`, {
      method:'POST', headers:{'apikey':SRK,'Authorization':'Bearer '+SRK}, body:f
    });
    if(r.ok) {
      const url = `${SBU}/storage/v1/object/public/${BUCKET}/${name}`;
      fotosActuales.push(url); renderFotos();
    }
  }
}

function renderFotos(){
  document.getElementById('fgrid').innerHTML = fotosActuales.map((u,i)=>`
    <div class="foto-item"><img src="${u}"><button onclick="fotosActuales.splice(${i},1);renderFotos()" style="position:absolute;top:0;right:0;background:red;color:white;border:none;cursor:pointer">✕</button></div>
  `).join('');
}

function abrirNuevo(){ editId=null; fotosActuales=[]; renderFotos(); toggleSubcat(); document.getElementById('pmov').classList.add('show'); }
function abrirEdit(id){
  const p=allP.find(x=>x.id==id); editId=id;
  document.getElementById('fn').value=p.nombre;
  document.getElementById('fc').value=p.categoria;
  toggleSubcat(); // Ejecutar para ocultar/mostrar según la categoría del producto
  document.getElementById('fsub').value=p.subcategoria || "";
  document.getElementById('fp').value=p.precio_usd;
  document.getElementById('fst').value=p.stock;
  fotosActuales = p.fotos || []; renderFotos();
  document.getElementById('pmov').classList.add('show');
}
function cerrarMod(){ document.getElementById('pmov').classList.remove('show'); }

async function guardarProd(){
  const payload = {
    nombre: document.getElementById('fn').value,
    categoria: document.getElementById('fc').value,
    subcategoria: document.getElementById('fc').value === 'Equipos' ? document.getElementById('fsub').value : null,
    precio_usd: parseFloat(document.getElementById('fp').value),
    stock: parseInt(document.getElementById('fst').value),
    fotos: fotosActuales
  };
  const r = await fetch(SBU+'/rest/v1/productos'+(editId?'?id=eq.'+editId:''), {
    method: editId?'PATCH':'POST', headers:H, body:JSON.stringify(payload)
  });
  if(r.ok){ showToast('¡Guardado!'); cerrarMod(); cargarProds(); }
}

function eliminar(id, nombre){
  cfShow('Eliminar', `¿Estás seguro de borrar "${nombre}"?`, async()=>{
    const r = await fetch(`${SBU}/rest/v1/productos?id=eq.${id}`, {
      method: 'DELETE', headers: {'apikey':SRK,'Authorization':'Bearer '+SRK}
    });
    if(r.ok || r.status===204){ showToast('Eliminado'); cargarProds(); }
  });
}

function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.className='show ok'; setTimeout(()=>t.className='',3000); }
let cfCb=null;
function cfShow(t,m,cb){ document.getElementById('cfmsg').textContent=m; cfCb=cb; document.getElementById('cfov').classList.add('show'); }
function cfClose(){ document.getElementById('cfov').classList.remove('show'); }
document.getElementById('cfok').onclick=()=>{ cfClose(); if(cfCb)cfCb(); };
</script>
</body>
</html>
